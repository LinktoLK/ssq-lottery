<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎱 双色球好运查询 - 你的幸运号码能中吗？</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="ssq-history-data.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7C3AED;
            --secondary: #A78BFA;
            --cta: #F43F5E;
            --bg-dark: #0F0F23;
            --bg-card: #1a1a3e;
            --text-light: #E2E8F0;
            --red-ball: #EF4444;
            --blue-ball: #3B82F6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Fredoka', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* CRT Scanline Effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 9999;
        }

        /* Neon Glow Effects */
        .neon-text {
            text-shadow:
                0 0 7px var(--primary),
                0 0 10px var(--primary),
                0 0 21px var(--primary),
                0 0 42px var(--secondary);
        }

        .neon-text-red {
            text-shadow:
                0 0 7px var(--cta),
                0 0 10px var(--cta),
                0 0 21px var(--cta);
        }

        .neon-border {
            border: 2px solid var(--primary);
            box-shadow:
                0 0 5px var(--primary),
                inset 0 0 10px rgba(124, 58, 237, 0.2);
        }

        .neon-glow {
            animation: neonPulse 2s ease-in-out infinite alternate;
        }

        @keyframes neonPulse {
            from { box-shadow: 0 0 5px var(--primary), 0 0 20px rgba(124, 58, 237, 0.4); }
            to { box-shadow: 0 0 15px var(--primary), 0 0 40px rgba(167, 139, 250, 0.6); }
        }

        /* Ball Styles */
        .ball {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            user-select: none;
            position: relative;
        }

        .ball-red {
            background: linear-gradient(135deg, #FF6B6B 0%, #EE4444 50%, #CC3333 100%);
            color: white;
            box-shadow: 
                0 4px 12px rgba(239, 68, 68, 0.4),
                inset 0 -3px 8px rgba(0,0,0,0.2),
                inset 0 3px 8px rgba(255,255,255,0.3);
            border: 2px solid #ff8888;
        }

        .ball-blue {
            background: linear-gradient(135deg, #60A5FA 0%, #3B82F6 50%, #2563EB 100%);
            color: white;
            box-shadow: 
                0 4px 12px rgba(59, 130, 246, 0.4),
                inset 0 -3px 8px rgba(0,0,0,0.2),
                inset 0 3px 8px rgba(255,255,255,0.3);
            border: 2px solid #7cb3f8;
        }

        .ball:hover {
            transform: scale(1.18) translateY(-3px);
            z-index: 10;
        }

        .ball.selected {
            transform: scale(1.22) translateY(-5px);
            animation: ballBounce 0.5s ease;
        }

        .ball.selected::after {
            content: '✓';
            position: absolute;
            top: -4px;
            right: -2px;
            width: 16px;
            height: 16px;
            background: #22c55e;
            border-radius: 50%;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 2px 6px rgba(34, 197, 94, 0.5);
        }

        @keyframes ballBounce {
            0% { transform: scale(1); }
            40% { transform: scale(1.35); }
            70% { transform: scale(1.15); }
            100% { transform: scale(1.22); }
        }

        /* Ball Grid */
        .ball-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            padding: 12px;
        }

        /* Selected Display */
        .selected-balls {
            min-height: 64px;
            background: rgba(26, 26, 62, 0.8);
            border-radius: 16px;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            border: 2px dashed rgba(124, 58, 237, 0.35);
            transition: all 0.3s ease;
        }

        .selected-balls.has-balls {
            border-style: solid;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.15);
        }

        .selected-balls .ball {
            width: 46px;
            height: 46px;
            font-size: 16px;
            cursor: default;
        }

        .selected-balls .ball:hover {
            transform: none;
        }

        /* Button */
        .btn-primary {
            background: linear-gradient(135deg, var(--cta), #e11d48);
            color: white;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 18px;
            padding: 14px 42px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(244, 63, 94, 0.45);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            color: var(--secondary);
            font-family: 'Fredoka', sans-serif;
            font-weight: 500;
            padding: 10px 28px;
            border-radius: 10px;
            border: 2px solid var(--secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(124, 58, 237, 0.15);
            transform: translateY(-2px);
        }

        /* Result Cards */
        .result-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 28px;
            border: 1px solid rgba(124, 58, 237, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .result-card:hover {
            border-color: rgba(124, 58, 237, 0.5);
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.12);
        }

        /* Luck Meter */
        .luck-meter {
            height: 20px;
            border-radius: 10px;
            background: rgba(30, 30, 60, 0.9);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(124, 58, 237, 0.3);
        }

        .luck-meter-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .luck-meter-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255,255,255,0.25) 50%,
                transparent 100%
            );
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* History Record */
        .history-record {
            background: rgba(26, 26, 62, 0.65);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s ease;
        }

        .history-record:hover {
            background: rgba(36, 36, 72, 0.85);
            transform: translateX(5px);
        }

        /* Share Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 36px;
            max-width: 480px;
            width: 90%;
            border: 2px solid rgba(124, 58, 237, 0.3);
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(40px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Floating particles */
        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            opacity: 0.4;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        /* Loading Animation */
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(124, 58, 237, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Glitch Effect for title */
        .glitch-title {
            position: relative;
            display: inline-block;
        }

        .glitch-title:hover::before,
        .glitch-title:hover::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
        }

        .glitch-title:hover::before {
            color: #ff00ff;
            animation: glitch-1 0.3s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
        }

        .glitch-title:hover::after {
            color: #00ffff;
            animation: glitch-2 0.3s infinite;
            clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%);
        }

        @keyframes glitch-1 {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        @keyframes glitch-2 {
            0% { transform: translate(0); }
            20% { transform: translate(3px, -3px); }
            40% { transform: translate(3px, 3px); }
            60% { transform: translate(-3px, -3px); }
            80% { transform: translate(-3px, 3px); }
            100% { transform: translate(0); }
        }

        /* Lucky Badge */
        .lucky-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            animation: badgePulse 2s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

        /* Responsive */
        @media (max-width: 640px) {
            .ball {
                width: 42px;
                height: 42px;
                font-size: 15px;
            }
            .ball-grid { gap: 6px; padding: 8px; }
            .selected-balls .ball { width: 38px; height: 38px; font-size: 14px; }
            .result-card { padding: 18px; }
        }
    </style>
</head>

    function calculateLuckScore(numbers) {
        // 基于多个因素的综合算法（搞笑版）
        const red = numbers.slice(0, 6);
        const blue = numbers[6];
        let score = 50; // 基础分

        // 1. 号码分布因素
        const sum = red.reduce((a, b) => a + b, 0);
        if (sum >= 90 && sum <= 120) score += 10; // 和值适中加分
        else if (sum < 70 || sum > 140) score -= 5;

        // 2. 奇偶平衡
        const oddCount = red.filter(n => n % 2 === 1).length;
        if (oddCount >= 2 && oddCount <= 4) score += 8;
        else score -= 3;

        // 3. 连号加成
        let consecutiveCount = 0;
        const sortedRed = [...red].sort((a, b) => a - b);
        for (let i = 0; i < sortedRed.length - 1; i++) {
            if (sortedRed[i + 1] - sortedRed[i] === 1) consecutiveCount++;
        }
        score += consecutiveCount * 3;

        // 4. 大小比例
        const bigCount = red.filter(n => n > 16).length;
        if (bigCount >= 2 && bigCount <= 4) score += 5;
        else score -= 2;

        // 5. 蓝球特殊处理
        if ([3, 6, 9, 12, 15].includes(blue)) score += 5; // 三的倍数
        if ([7, 14].includes(blue)) score += 3; // 吉利数
        if (blue === 1) score += 4; // 第一名！

        // 6. 特殊号码加成
        if (red.includes(8)) score += 4; // 发
        if (red.includes(6)) score += 3; // 顺
        if (red.includes(18)) score += 3; // 要发
        if (red.includes(9)) score += 2; // 久

        // 7. 避坑扣分
        if (red.includes(4)) score -= 3; // 死
        if (red.includes(13)) score -= 2; // 西方不吉利
        if (blue === 4) score -= 2;

        // 8. 随机波动（让结果更有趣）
        score += Math.floor(Math.random() * 15) - 7;

        // 9. 时间因子（基于当前时间的伪随机）
        const now = new Date();
        const timeFactor = ((now.getHours() * now.getDate()) % 10) - 5;
        score += timeFactor;

        return Math.max(0, Math.min(100, score));
    }

    function animateScore(targetScore) {
        const el = document.getElementById('score-number');
        const meterEl = document.getElementById('luck-meter-fill');
        const labelEl = document.getElementById('score-label');
        let current = 0;
        const duration = 1800;
        const startTime = performance.now();

        // 确定颜色等级
        const level = LUCK_LEVELS.find(l => targetScore >= l.range[0] && targetScore <= l.range[1]);
        const color = level ? level.color : '#A78BFA';
        meterEl.style.background = level ? level.bgColor : 'linear-gradient(135deg, #7C3AED, #A78BFA)';

        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            
            // 缓出效果
            const easeOut = 1 - Math.pow(1 - progress, 3);
            current = Math.round(easeOut * targetScore);
            
            el.textContent = current;
            el.style.color = color;
            el.style.textShadow = `0 0 20px ${color}, 0 0 40px ${color}`;
            meterEl.style.width = `${current}%`;

            if (progress < 1) {
                requestAnimationFrame(update);
            } else {
                labelEl.textContent = '好运指数满分100分！看看下面详细解析 👇';
                document.getElementById('lucky-analysis').classList.remove('hidden');
            }
        }

        requestAnimationFrame(update);
    }

            };
            
            html += `
                <div class="history-record">
                    <div class="flex flex-wrap items-center justify-between gap-2 mb-2">
                        <div class="flex items-center gap-3">
                            <span class="text-purple-300 font-mono text-sm">第 ${r.issue} 期</span>
                            <span class="text-gray-500 text-xs">${r.date}</span>
                        </div>
                        <span class="lucky-badge text-xs" style="background: linear-gradient(135deg, ${prizeColors[r.prizeLevel]?.split(' ')[0] || '#666'}, ${prizeColors[r.prizeLevel]?.split(' ')[1] || '#888'}); color: white;">
                            🏆 ${r.prizeLevel}
                        </span>
                    </div>
                    <div class="flex flex-wrap items-center gap-1 my-2">
                        ${redBalls}
                        <span class="mx-1 text-gray-500">+</span>
                        ${blueBall}
                        <span class="ml-3 text-xs text-purple-300 bg-purple-500/10 px-2 py-1 rounded-full">
                            匹配 ${r.matchRed} 红 + ${r.matchBlue} 蓝
                        </span>
                    </div>
                </div>
            `;
        });

        if (results.length > 10) {
            html += `<p class="text-purple-400/50 text-center text-sm mt-3">还有 ${results.length - 10} 条记录未展示...</p>`;
        }

        container.innerHTML = html;
    }

    function getPrizeLevel(redMatch, blueMatch) {
        if (redMatch === 6 && blueMatch === 1) return '特等奖';
        if (redMatch === 6 && blueMatch === 0) return '一等奖';
        if (redMatch === 5 && blueMatch === 1) return '二等奖';
        if (redMatch === 5 && blueMatch === 0 || redMatch === 4 && blueMatch === 1) return '三等奖';
        if (redMatch === 4 && blueMatch === 0 || redMatch === 3 && blueMatch === 1) return '四等奖';
        if (redMatch === 2 && blueMatch === 1 || redMatch === 1 && blueMatch === 1 || redMatch === 0 && blueMatch === 1) return '五等奖';
        return '六等奖';
    }

    // =============================================
    // 分享功能
    // =============================================
    function openShareModal() {
        const modal = document.getElementById('share-modal');
        modal.classList.add('active');

        const redStr = selectedRed.map(n => String(n).padStart(2, '0')).join(' ');
        const blueStr = String(selectedBlue).padStart(2, '0');
        const score = parseInt(document.getElementById('score-number').textContent);
        const level = LUCK_LEVELS.find(l => score >= l.range[0] && score <= l.range[1]);

        const shareText = `🎱 我的双色球好运指数出炉啦！\n\n` +
            `🔴 我的号码：${redStr}\n` +
            `🔵 蓝球：${blueStr}\n\n` +
            `✨ 好运指数：${score}/100\n` +
            `${level?.label || ''}\n\n` +
            `快来测测你的幸运号码吧！\n` +
            `👇👇👇\n` +
            `(分享自双色球好运查询工具)`;

        document.getElementById('share-preview').innerHTML = `
            <div class="text-left space-y-3">
                <div class="flex justify-center gap-2 mb-4">
                    ${selectedRed.map(n => `<span class="w-9 h-9 rounded-full bg-gradient-to-br from-red-400 to-red-600 text-white flex items-center justify-center font-bold text-sm shadow-lg">${String(n).padStart(2,'0')}</span>`).join('')}
                    <span class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 text-white flex items-center justify-center font-bold text-sm shadow-lg">${String(selectedBlue).padStart(2,'0')}</span>
                </div>
                <div class="text-3xl font-bold text-center" style="font-family:'Fredoka',sans-serif;color:${level?.color||'#A78BFA'};">${score} 分</div>
                <div class="text-center text-sm text-purple-300">${level?.label || ''}</div>
            </div>
        `;
        
        document.getElementById('share-modal').dataset.shareText = shareText;
        document.getElementById('copy-success').classList.add('hidden');
    }

    function closeShareModal(event) {
        if (!event || event.target.id === 'share-modal') {
            document.getElementById('share-modal').classList.remove('active');
        }
    }

    async function copyToClipboard() {
        const text = document.getElementById('share-modal').dataset.shareText;
        try {
            await navigator.clipboard.writeText(text);
            document.getElementById('copy-success').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('copy-success').classList.add('hidden');
            }, 2500);
        } catch {
            // Fallback
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            textarea.remove();
            document.getElementById('copy-success').classList.remove('hidden');
        }
    }

    // =============================================
    // 工具函数
    // =============================================
    function resetToSelection() {
        document.getElementById('results-section').classList.add('hidden');
        document.getElementById('selection-section').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'fixed top-6 left-1/2 -translate-x-1/2 bg-purple-600 text-white px-6 py-3 rounded-xl shadow-2xl z-[10001] animate-pulse';
        toast.style.fontFamily = "'Nunito', sans-serif";
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // 启动应用
    init();
    </script>
</body>
</html>
